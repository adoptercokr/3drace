<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const TOTAL_LAPS  = 3;
const TRACK_W     = 18;
const MAX_SPD     = 0.55;
const BOOST_SPD   = 1.1;
const ACCEL       = 0.019;
const FRIC        = 0.963;
const BRAKE_FRIC  = 0.87;
const TURN        = 0.026;
const BOOST_DUR   = 3.5;
const OFF_FRIC    = 0.85;
const SEG         = 400;

// ═══════════════════════════════════════════════
//  COMPLEX TRACK  (Monaco-style circuit)
// ═══════════════════════════════════════════════
const trackCurve = new THREE.CatmullRomCurve3([
  // ── Pit straight (start/finish) ──
  new THREE.Vector3(  0,  0, -72),   // SF line
  new THREE.Vector3( 22,  0, -74),
  new THREE.Vector3( 50,  0, -68),
  // ── Turn 1 – medium right ──
  new THREE.Vector3( 72,  0, -50),
  new THREE.Vector3( 82,  0, -28),
  new THREE.Vector3( 80,  0,  -2),
  // ── Chicane ──
  new THREE.Vector3( 70,  0,  22),
  new THREE.Vector3( 52,  0,  36),
  new THREE.Vector3( 30,  0,  44),   // left kink
  new THREE.Vector3(  8,  0,  50),
  // ── Hairpin ──
  new THREE.Vector3(-18,  0,  66),
  new THREE.Vector3(-40,  0,  72),
  new THREE.Vector3(-60,  0,  62),
  new THREE.Vector3(-72,  0,  42),
  // ── Long left sweeper ──
  new THREE.Vector3(-82,  0,  14),
  new THREE.Vector3(-80,  0, -14),
  // ── Technical S-section ──
  new THREE.Vector3(-70,  0, -38),
  new THREE.Vector3(-52,  0, -56),
  new THREE.Vector3(-30,  0, -68),
  new THREE.Vector3(-12,  0, -74),
], true, 'catmullrom', 0.5);

const trackSamples = trackCurve.getPoints(300);

function nearestOnTrack(p) {
  let best = Infinity, bp = null;
  for (const s of trackSamples) {
    const d = p.distanceTo(s);
    if (d < best) { best = d; bp = s; }
  }
  return { dist: best, pt: bp };
}

// ═══════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000712);
scene.fog = new THREE.FogExp2(0x000712, 0.0045);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 700);
camera.position.set(0, 28, -88);
camera.lookAt(0, 0, 0);

// ═══════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x112255, 2.5));
const keyLight = new THREE.DirectionalLight(0x4477bb, 1.8);
keyLight.position.set(20, 80, 20);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x221133, 0.6);
fillLight.position.set(-20, 30, -20);
scene.add(fillLight);

// ═══════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════
{
  const v = [];
  for (let i = 0; i < 3000; i++)
    v.push((Math.random()-.5)*800, Math.random()*300+20, (Math.random()-.5)*800);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: .3, sizeAttenuation: true })));
}

// ═══════════════════════════════════════════════
//  GROUND
// ═══════════════════════════════════════════════
{
  const g = new THREE.PlaneGeometry(900, 900, 40, 40);
  const m = new THREE.MeshLambertMaterial({ color: 0x030508 });
  const mesh = new THREE.Mesh(g, m);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = -.2;
  scene.add(mesh);
}

// ═══════════════════════════════════════════════
//  TRACK RIBBON BUILDER
// ═══════════════════════════════════════════════
function buildRibbon(width, yOff = 0) {
  const pos = [], uv = [], idx = [], w = width / 2, N = SEG;
  for (let i = 0; i <= N; i++) {
    const t = (i / N) % 1;
    const pt  = trackCurve.getPoint(t);
    const tan = trackCurve.getTangent(t).normalize();
    const up  = new THREE.Vector3(0, 1, 0);
    const right = new THREE.Vector3().crossVectors(tan, up).normalize();
    const L = pt.clone().addScaledVector(right, -w); L.y += yOff;
    const R = pt.clone().addScaledVector(right,  w); R.y += yOff;
    pos.push(L.x, L.y, L.z, R.x, R.y, R.z);
    uv.push(0, i/N*12, 1, i/N*12);
  }
  for (let i = 0; i < N; i++) {
    const a=i*2, b=a+1, c=(i+1)*2, d=c+1;
    idx.push(a, c, b, b, c, d);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

// Curb (red/white alternating look – single color here)
const curbMesh = new THREE.Mesh(buildRibbon(TRACK_W + 3.5, -.04),
  new THREE.MeshLambertMaterial({ color: 0x991111, side: THREE.DoubleSide }));
scene.add(curbMesh);

// White inner curb strip
const whiteCurb = new THREE.Mesh(buildRibbon(TRACK_W + 1.2, -.02),
  new THREE.MeshLambertMaterial({ color: 0xeeeeee, side: THREE.DoubleSide }));
scene.add(whiteCurb);

// Main tarmac
const trackMesh = new THREE.Mesh(buildRibbon(TRACK_W, 0),
  new THREE.MeshLambertMaterial({ color: 0x0e1525, side: THREE.DoubleSide }));
scene.add(trackMesh);

// Center line (dashed visual only – using line)
{
  const pts = [];
  for (let i = 0; i <= SEG; i++) {
    const pt = trackCurve.getPoint((i / SEG) % 1).clone();
    pt.y = .04; pts.push(pt);
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: .5 })
  ));
}

// ── Edge glow lines ──
function buildEdge(side) {
  const pts = [], hw = (TRACK_W / 2 + .7) * side;
  for (let i = 0; i <= SEG; i++) {
    const t = (i / SEG) % 1;
    const pt  = trackCurve.getPoint(t);
    const tan = trackCurve.getTangent(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0,1,0)).normalize();
    const ep = pt.clone().addScaledVector(right, hw); ep.y = .1; pts.push(ep);
  }
  return new THREE.BufferGeometry().setFromPoints(pts);
}
scene.add(new THREE.Line(buildEdge( 1), new THREE.LineBasicMaterial({ color: 0x00ffff })));
scene.add(new THREE.Line(buildEdge(-1), new THREE.LineBasicMaterial({ color: 0xff00ff })));

// ── Start/finish line ──
{
  const pt  = trackCurve.getPoint(0);
  const tan = trackCurve.getTangent(0).normalize();
  const up  = new THREE.Vector3(0, 1, 0);
  const geo = new THREE.PlaneGeometry(TRACK_W, 1.2);
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
  mesh.position.copy(pt); mesh.position.y = .08;
  const mx = new THREE.Matrix4().lookAt(pt.clone().add(tan), pt, up);
  mesh.setRotationFromQuaternion(new THREE.Quaternion().setFromRotationMatrix(mx));
  mesh.rotateX(Math.PI / 2);
  scene.add(mesh);
}

// ── Track barriers (glowing guard rails) ──
function buildBarrier(side, height = 1.2, color = 0x0033aa) {
  const pts = [], hw = (TRACK_W / 2 + 1.8) * side;
  for (let i = 0; i <= SEG; i++) {
    const t = (i / SEG) % 1;
    const pt  = trackCurve.getPoint(t);
    const tan = trackCurve.getTangent(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0,1,0)).normalize();
    const ep = pt.clone().addScaledVector(right, hw);
    pts.push(ep.clone());
    ep.y += height;
    pts.push(ep.clone());
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color }));
}
scene.add(buildBarrier( 1, 1.2, 0x0088ff));
scene.add(buildBarrier(-1, 1.2, 0xff0088));

// ── Light pillars along track ──
{
  const PILLAR_COUNT = 30;
  const pillarMat = new THREE.MeshLambertMaterial({ color: 0x222233 });
  const glowMat   = new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: .9 });
  for (let i = 0; i < PILLAR_COUNT; i++) {
    const t = i / PILLAR_COUNT;
    const pt  = trackCurve.getPoint(t);
    const tan = trackCurve.getTangent(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0,1,0)).normalize();
    const side = i % 2 === 0 ? 1 : -1;
    const base = pt.clone().addScaledVector(right, (TRACK_W / 2 + 3.5) * side);

    // Pole
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(.12, .15, 5, 6), pillarMat);
    pole.position.set(base.x, 2.5, base.z);
    scene.add(pole);

    // Light head
    const head = new THREE.Mesh(new THREE.BoxGeometry(.6, .25, .4), glowMat);
    head.position.set(base.x, 5.2, base.z);
    scene.add(head);

    // Point light (every other to save perf)
    if (i % 3 === 0) {
      const pl = new THREE.PointLight(i % 2 === 0 ? 0x0088ff : 0xff0088, .8, 18);
      pl.position.set(base.x, 5, base.z);
      scene.add(pl);
    }
  }
}

// ── Background city silhouette ──
{
  const bldMat = new THREE.MeshLambertMaterial({ color: 0x050a18, emissive: 0x010308 });
  const heights = [20, 35, 28, 42, 18, 30, 38, 25, 44, 32, 22, 36, 29, 16, 40];
  heights.forEach((h, i) => {
    const w = 8 + Math.random() * 12;
    const d = 6 + Math.random() * 10;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, bldMat);
    const angle = (i / heights.length) * Math.PI * 2;
    const r = 140 + Math.random() * 40;
    mesh.position.set(Math.cos(angle) * r, h / 2, Math.sin(angle) * r);
    scene.add(mesh);
    // Window dots
    const wMat = new THREE.MeshBasicMaterial({ color: Math.random() > .5 ? 0xffee88 : 0x88ccff, transparent: true, opacity: .7 });
    const wMesh = new THREE.Mesh(new THREE.BoxGeometry(w * .7, h * .6, .5), wMat);
    wMesh.position.copy(mesh.position);
    wMesh.position.z += d / 2 + .3;
    scene.add(wMesh);
  });
}

// ═══════════════════════════════════════════════
//  BOOST PADS
// ═══════════════════════════════════════════════
const BOOST_TS = [.18, .45, .72];
const boostPads = [];
for (const bt of BOOST_TS) {
  const pt  = trackCurve.getPoint(bt);
  const tan = trackCurve.getTangent(bt).normalize();
  const up  = new THREE.Vector3(0, 1, 0);
  const right = new THREE.Vector3().crossVectors(tan, up).normalize();
  const geo = new THREE.PlaneGeometry(6, 10);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: .3, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pt); mesh.position.y = .1;
  const mx = new THREE.Matrix4().lookAt(pt.clone().add(tan), pt, up);
  mesh.setRotationFromQuaternion(new THREE.Quaternion().setFromRotationMatrix(mx));
  mesh.rotateX(Math.PI / 2);
  scene.add(mesh);
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x00ffff })));
  // Arrow chevrons
  for (let a = 0; a < 3; a++) {
    const arrGeo = new THREE.PlaneGeometry(3.5, 2.5);
    const arrMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: .15, side: THREE.DoubleSide });
    const arrMesh = new THREE.Mesh(arrGeo, arrMat);
    arrMesh.position.set(0, (a - 1) * 3, .01);
    mesh.add(arrMesh);
  }
  boostPads.push({ pos: pt.clone(), mesh });
}

// ═══════════════════════════════════════════════
//  PORSCHE 911-STYLE CAR
// ═══════════════════════════════════════════════
function buildCar() {
  const grp = new THREE.Group();

  // Materials
  const paint  = new THREE.MeshLambertMaterial({ color: 0xc8c0a8, emissive: 0x100e08 }); // Silver GT silver
  const darkPaint = new THREE.MeshLambertMaterial({ color: 0x1a1a2a, emissive: 0x050508 });
  const glass  = new THREE.MeshLambertMaterial({ color: 0x223344, transparent: true, opacity: .75 });
  const chrome = new THREE.MeshLambertMaterial({ color: 0xddddcc, emissive: 0x111111 });
  const rubber = new THREE.MeshLambertMaterial({ color: 0x0d0d0d });

function add(grp, geo, mat, pos) {
  const m = new THREE.Mesh(geo, mat);
  if (pos) m.position.set(...pos);
  grp.add(m); return m;
}

// ═══════════════════════════════════════════════
//  ENGINE SOUND  (Web Audio API)
// ═══════════════════════════════════════════════
let audioCtx = null, engOsc1 = null, engOsc2 = null, engGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Primary sawtooth oscillator
    engOsc1 = audioCtx.createOscillator();
    engOsc1.type = 'sawtooth';
    engOsc1.frequency.value = 65;
    // Secondary for harmonics
    engOsc2 = audioCtx.createOscillator();
    engOsc2.type = 'sawtooth';
    engOsc2.frequency.value = 130;
    // Slight distortion waveshaper for rumble
    const wshaper = audioCtx.createWaveShaper();
    const c = new Float32Array(512);
    const k = 280;
    for (let i = 0; i < 512; i++) {
      const x = (i * 2) / 512 - 1;
      c[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
    }
    wshaper.curve = c;
    // Master gain
    engGain = audioCtx.createGain();
    engGain.gain.value = 0;
    // Low-pass filter
    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 800;

    const osc2Gain = audioCtx.createGain();
    osc2Gain.gain.value = 0.25;

    engOsc1.connect(wshaper);
    engOsc2.connect(osc2Gain);
    osc2Gain.connect(wshaper);
    wshaper.connect(lpf);
    lpf.connect(engGain);
    engGain.connect(audioCtx.destination);

    engOsc1.start();
    engOsc2.start();
  } catch(e) { audioCtx = null; }
}

function updateSound(spd, maxSpd, boost) {
  if (!audioCtx) return;
  const n = Math.abs(spd) / maxSpd;
  const baseFreq = boost ? 170 : 65;
  const targetFreq = baseFreq + n * (boost ? 140 : 110);
  const now = audioCtx.currentTime;
  engOsc1.frequency.setTargetAtTime(targetFreq, now, .08);
  engOsc2.frequency.setTargetAtTime(targetFreq * 2, now, .08);
  const targetGain = n * .22 + .04;
  engGain.gain.setTargetAtTime(started ? targetGain : 0, now, .12);
}

//  GAME STATE
// ═══════════════════════════════════════════════
let started = false, finished = false;
let lap = 0, lapStart = 0, bestLap = Infinity, lapTimes = [];
let prevSide = null, gateReady = false;

const gatePos  = trackCurve.getPoint(0);
const gateTan  = trackCurve.getTangent(0).normalize();
const gateNorm = new THREE.Vector3(-gateTan.z, 0, gateTan.x).normalize();

function timeFmt(ms) {
  return `${Math.floor(ms/60000)}:${String(Math.floor((ms%60000)/1000)).padStart(2,'0')}.${String(Math.floor(ms%1000)).padStart(3,'0')}`;
}

function startGame() {
  if (started) return;
  started = true; finished = false;
  lap = 0; lapStart = performance.now(); lapTimes = []; prevSide = null; gateReady = false;
  initAudio();
  const m = document.getElementById('msg');
  m.style.opacity = '0';
  setTimeout(() => m.style.display = 'none', 600);
}

function checkLap() {
  if (!started || finished) return;
  // Wait until car travels 30+ units from the gate before counting laps
  if (!gateReady) {
    if (carPos.distanceTo(gatePos) > 30) gateReady = true;
    else return;
  }
  const dx = carPos.x - gatePos.x, dz = carPos.z - gatePos.z;
  
  // 1. Check lateral boundary (make sure we cross on the track, not somewhere else)
  const lateral = gateNorm.x*dx + gateNorm.z*dz;
  if (Math.abs(lateral) > 25) { prevSide=null; return; }
  
  // 2. Check longitudinal position (gate zone)
  const side = gateTan.x*dx + gateTan.z*dz;
  if (Math.abs(side) > 15) { prevSide=null; return; }
  
  if (prevSide !== null && Math.abs(side) > 0.1) {
    const ps = prevSide>0?1:-1, cs = side>0?1:-1;
    // Crossing forward: from negative side (< 0) to positive side (> 0)
    if (ps !== cs && cs === 1) {
      const now = performance.now(), lt = now - lapStart;
      lapTimes.push(lt);
      if (lt < bestLap) { bestLap = lt; document.getElementById('besttime').textContent = 'BEST: '+timeFmt(bestLap); }
      lap++; lapStart = now;
      gateReady = false; // must travel away from gate again before next lap
      document.getElementById('lapnum').textContent = `LAP ${lap} / ${TOTAL_LAPS}`;
      flashLap(lap >= TOTAL_LAPS);
      if (lap >= TOTAL_LAPS) { finished = true; setTimeout(showNameBox, 1300); }
    }
  }
  if (Math.abs(side) > 0.1) prevSide = side;
}

function flashLap(done) {
  const el = document.getElementById('lap-flash');
  el.textContent = done ? '완주!' : `LAP ${lap}`;
  el.style.color = done ? '#ffff00' : '#ff00ff';
  el.style.textShadow = `0 0 40px ${done?'#ffff00':'#ff00ff'}`;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 1400);
}

function checkBoost() {
  for (const pad of boostPads) { if (carPos.distanceTo(pad.pos) < 8) { boostT = BOOST_DUR; return; } }
}

// ── Simulated gear (cosmetic) ──
function getGear(n) {
  if (n < .01) return 'N';
  if (n < .18) return '1';
  if (n < .36) return '2';
  if (n < .54) return '3';
  if (n < .72) return '4';
  if (n < .88) return '5';
  return '6';
}

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
let prevT = 0;
function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min((t - prevT) / 1000, .05);
  prevT = t;

  if (started && !finished) {
    const ems = boostT > 0 ? BOOST_SPD : MAX_SPD;

    // Steering (speed-sensitive)
    const sf = .28 + .72 * Math.min(Math.abs(carSpd) / MAX_SPD, 1);
    if (K.left)  carAngle += TURN * sf;
    if (K.right) carAngle -= TURN * sf;

    // Throttle / Brake
    if (K.up)        carSpd = Math.min(carSpd + ACCEL, ems);
    else if (K.down) carSpd *= BRAKE_FRIC;
    else             carSpd *= FRIC;

    // Move car
    const fwd = new THREE.Vector3(Math.sin(carAngle), 0, Math.cos(carAngle));
    carPos.addScaledVector(fwd, -carSpd);
    carPos.y = 0;

    // Track boundary
    const { dist: td, pt: closestPt } = nearestOnTrack(carPos);
    if (td > TRACK_W / 2) {
      carSpd *= OFF_FRIC;
      if (closestPt) {
        const dir = new THREE.Vector3(closestPt.x - carPos.x, 0, closestPt.z - carPos.z).normalize();
        carPos.addScaledVector(dir, .38 * (td - TRACK_W / 2));
      }
    }

    // Boost / Lap
    if (boostT > 0) boostT = Math.max(0, boostT - dt);
    checkBoost();
    checkLap();
    updateSound(carSpd, MAX_SPD, boostT > 0);

    // Wheel rotation
    wheelRot -= carSpd * 2.5;

    // HUD
    const n = Math.abs(carSpd) / MAX_SPD;
    document.getElementById('speednum').textContent = String(Math.abs(Math.round(carSpd * 320)));
    document.getElementById('boostbar').style.width  = `${(boostT / BOOST_DUR) * 100}%`;
    document.getElementById('laptime').textContent   = timeFmt(performance.now() - lapStart);
    document.getElementById('gear').textContent      = getGear(n);
  }

  // ── Car mesh update ──
  carGrp.position.copy(carPos);
  carGrp.position.y = 0;
  carGrp.rotation.y = carAngle;

  // Animate wheel rotation (visual)
  carGrp.children.forEach(child => {
    if (child.geometry && child.geometry.type === 'CylinderGeometry') {
